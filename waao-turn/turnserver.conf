# coturn for WAAO LiveKit relay
# - TLS termination is handled by Fly Edge (handlers = ["tls"]) on port 5349,
#   forwarded as plain TCP to internal 3478. From the client's perspective the
#   wire is TLS — passes through corporate/mobile DPI.
# - UDP 3478 is exposed directly for low-latency TURN/UDP where reachable.
# - Auth: REST shared-secret (RFC 5389/8489 long-term credential, HMAC) so
#   LiveKit can mint short-lived TURN credentials on demand.

listening-port=3478
# We listen on TCP/UDP 3478 and on plain TCP 3478 for the TLS-terminated relay.

# Auth — single long-term credential. Password swapped in at boot from
# TURN_SHARED_SECRET. LiveKit advertises this username+credential to clients.
# Trade-off vs. HMAC short-lived creds: anyone with the bundle can use the
# relay, but the deployment is private and the cost ceiling is small.
user=waao:__TURN_SHARED_SECRET__

# Realm shown in the TURN credential challenge.
realm=waao.com.br

# External IP discovery — coturn uses STUN to learn its public IP on startup.
# Fly assigns a single dedicated v4 per app; this is fine for relay candidates.
# (If we ever pin a static IP, set external-ip explicitly here.)

# Relay port range — keep small to fit Fly's port surface and avoid noise.
min-port=40000
max-port=40500

# Hardened defaults.
fingerprint
lt-cred-mech
no-multicast-peers
no-cli
log-file=stdout
verbose
no-tlsv1
no-tlsv1_1
