app = 'waao-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  ASPNETCORE_ENVIRONMENT = 'Production'
  ASPNETCORE_URLS = 'http://+:8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    timeout = '5s'
    path = '/health'

[deploy]
  strategy = 'immediate'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
